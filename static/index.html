<title>Vector Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
    :root {
        font-size: 12px;

        /* Light Mode — warm, Claude-inspired */
        --bg-app: #faf9f7;
        --bg-sidebar: #f0efed;
        --bg-message-user: #e8e6e3;
        --bg-message-assistant: transparent;
        --bg-input: #ffffff;
        --border-color: rgba(0, 0, 0, 0.08);
        --border-strong: rgba(0, 0, 0, 0.12);
        --text-main: #1a1a1a;
        --text-secondary: #787067;
        --text-tertiary: #a39e96;
        --accent-color: #c96442;
        --accent-hover: #b5553a;
        --accent-subtle: rgba(201, 100, 66, 0.08);
        --code-bg: #f0efed;
        --scrollbar-thumb: #ccc9c4;
        --selection-bg: rgba(201, 100, 66, 0.15);

        /* Type scale — 1.2 ratio from 14px base */
        --text-xs: 0.694rem;
        /* ~9.7px — meta, counters */
        --text-sm: 0.833rem;
        /* ~11.7px — labels, source content */
        --text-base: 1rem;
        /* 14px — body, messages */
        --text-lg: 1.2rem;
        /* ~16.8px — sidebar title */
        --text-xl: 1.44rem;
        /* ~20px — welcome heading */

        /* Spacing scale */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 24px;
        --space-6: 32px;
        --space-7: 48px;

        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 16px;
        --radius-full: 9999px;
    }

    [data-theme="dark"] {
        /* Dark Mode — terminal-inspired, warm */
        --bg-app: #1a1816;
        --bg-sidebar: #141210;
        --bg-message-user: #272420;
        --bg-message-assistant: transparent;
        --bg-input: #201e1b;
        --border-color: rgba(255, 255, 255, 0.06);
        --border-strong: rgba(255, 255, 255, 0.1);
        --text-main: #e8e4df;
        --text-secondary: #9b9489;
        --text-tertiary: #635d55;
        --accent-color: #d4795a;
        --accent-hover: #e08a6b;
        --accent-subtle: rgba(212, 121, 90, 0.1);
        --code-bg: #242120;
        --scrollbar-thumb: #3a3632;
    }

    ::selection {
        background: var(--selection-bg);
    }

    *,
    *::before,
    *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg-app);
        color: var(--text-main);
        height: 100vh;
        overflow: hidden;
        transition: background 0.15s, color 0.15s;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
    }

    .app {
        display: grid;
        grid-template-columns: 190px 1fr 300px;
        height: 100vh;
    }

    /* ── Sidebar (Left) ── */
    .sidebar {
        background: var(--bg-sidebar);
        border-right: 1px solid var(--border-color);
        display: flex;
        flex-direction: column;
        padding: var(--space-3);
        gap: var(--space-1);
    }

    .sidebar-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: var(--space-2) var(--space-2);
        margin-bottom: var(--space-3);
    }

    .sidebar-header h1 {
        font-size: var(--text-lg);
        font-weight: 700;
        color: var(--text-main);
        letter-spacing: -0.02em;
    }

    /* ── Collection Selection ── */
    .collection-select {
        margin: var(--space-1) 0 var(--space-2);
        position: relative;
    }

    .collection-select label {
        font-size: var(--text-xs);
        color: var(--text-tertiary);
        font-weight: 500;
        padding-left: var(--space-3);
        margin-bottom: var(--space-1);
    }

    .collection-select select {
        -webkit-appearance: none;
        -moz-appearance: none;
        appearance: none;
        background: transparent;
        border: none;
        color: var(--text-secondary);
        padding: var(--space-2) var(--space-5) var(--space-2) var(--space-3);
        border-radius: var(--radius-md);
        font-size: var(--text-sm);
        font-family: inherit;
        font-weight: 500;
        outline: none;
        cursor: pointer;
        width: 100%;
        transition: background 0.1s, color 0.1s;
    }

    .collection-select::after {
        content: '\25BC';
        position: absolute;
        right: var(--space-3);
        bottom: var(--space-2);
        color: var(--text-tertiary);
        font-size: var(--text-sm);
        pointer-events: none;
    }

    .collection-select select:hover {
        background: var(--accent-subtle);
        color: var(--text-main);
    }

    .collection-select select:focus {
        background: var(--accent-subtle);
        color: var(--accent-color);
    }

    .btn-sidebar {
        background: transparent;
        border: none;
        color: var(--text-secondary);
        padding: var(--space-2) var(--space-3);
        border-radius: var(--radius-md);
        cursor: pointer;
        font-size: var(--text-sm);
        font-family: inherit;
        text-align: left;
        display: flex;
        align-items: center;
        gap: var(--space-2);
        width: 100%;
        transition: background 0.1s, color 0.1s;
    }

    .btn-sidebar:hover {
        background: var(--accent-subtle);
        color: var(--accent-color);
    }

    /* ── Center: Chat ── */
    .chat-panel {
        display: flex;
        flex-direction: column;
        overflow: hidden;
        min-height: 0;
        background: var(--bg-app);
    }

    .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: var(--space-3) var(--space-5);
        flex-shrink: 0;
        height: 44px;
    }

    .messages {
        flex: 1;
        overflow-y: auto;
        padding: var(--space-7) 12% var(--space-7) 12%;
        display: flex;
        flex-direction: column;
        gap: var(--space-5);
        scroll-behavior: smooth;
    }

    .welcome {
        align-self: center;
        margin-top: 6em;
        text-align: center;
        color: var(--text-tertiary);
        font-size: var(--text-xl);
        font-weight: 700;
        letter-spacing: -0.03em;
    }

    .message {
        max-width: 100%;
        display: flex;
        flex-direction: column;
        gap: var(--space-1);
    }

    .message.user {
        align-self: flex-end;
        background: var(--bg-message-user);
        border-radius: var(--radius-lg);
        padding: var(--space-3) var(--space-4);
        max-width: 80%;
    }

    .message.assistant {
        align-self: flex-start;
        background: var(--bg-message-assistant);
        border-radius: 0;
        padding: 0;
        width: 100%;
    }

    .msg-label {
        font-size: var(--text-xs);
        font-weight: 600;
        color: var(--accent-color);
        text-transform: uppercase;
        letter-spacing: 0.04em;
        margin-bottom: var(--space-1);
    }

    .msg-content {
        font-size: var(--text-base);
        line-height: 1.6;
        word-break: break-word;
    }

    /* markdown styles */
    .msg-content p {
        margin-bottom: 0.8em;
    }

    .msg-content p:last-child {
        margin-bottom: 0;
    }

    .msg-content h1,
    .msg-content h2,
    .msg-content h3 {
        margin: 1.4em 0 0.4em;
        font-weight: 600;
        line-height: 1.3;
        letter-spacing: -0.01em;
    }

    .msg-content h1 {
        font-size: 1.15em;
    }

    .msg-content h2 {
        font-size: 1.05em;
    }

    .msg-content h3 {
        font-size: 1em;
        color: var(--text-secondary);
    }

    .msg-content code {
        background: var(--code-bg);
        padding: 0.15em 0.35em;
        border-radius: var(--radius-sm);
        font-family: 'SF Mono', SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 0.88em;
    }

    .msg-content pre {
        background: var(--code-bg);
        padding: var(--space-4);
        border-radius: var(--radius-md);
        overflow-x: auto;
        margin: 0.8em 0;
        border: 1px solid var(--border-color);
    }

    .msg-content pre code {
        background: none;
        padding: 0;
        font-size: 0.88em;
        color: inherit;
    }

    .msg-content ul,
    .msg-content ol {
        padding-left: 1.4em;
        margin: 0.8em 0;
    }

    .msg-content li {
        margin-bottom: 0.3em;
    }

    .msg-content strong {
        font-weight: 600;
    }

    .input-container {
        padding: 0 var(--space-5) var(--space-5) var(--space-5);
        background: var(--bg-app);
    }

    .input-area {
        display: flex;
        flex-direction: column;
        background: var(--bg-input);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-lg);
        padding: var(--space-3) var(--space-4);
        max-width: 780px;
        margin: 0 auto;
        transition: border-color 0.15s, box-shadow 0.15s;
    }

    .input-area:focus-within {
        border-color: var(--accent-color);
        box-shadow: 0 0 0 2px var(--accent-subtle);
    }

    textarea#query-input {
        width: 100%;
        background: transparent;
        border: none;
        color: var(--text-main);
        font-size: var(--text-base);
        font-family: inherit;
        resize: none;
        outline: none;
        min-height: 22px;
        padding: var(--space-1) 0;
        line-height: 1.5;
    }

    textarea#query-input::placeholder {
        color: var(--text-tertiary);
    }

    .input-footer {
        display: flex;
        justify-content: flex-end;
        padding-top: var(--space-2);
    }

    .btn-send {
        background: var(--accent-color);
        border: none;
        color: #fff;
        padding: var(--space-1) var(--space-4);
        border-radius: var(--radius-full);
        cursor: pointer;
        font-size: var(--text-sm);
        font-weight: 600;
        font-family: inherit;
        transition: background 0.1s, transform 0.1s;
    }

    .btn-send:hover {
        background: var(--accent-hover);
    }

    .btn-send:active {
        transform: scale(0.97);
    }

    .btn-send:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        transform: none;
    }

    /* ── Right: Sources ── */
    .sources-panel {
        display: flex;
        flex-direction: column;
        background: var(--bg-sidebar);
        border-left: 1px solid var(--border-color);
        overflow: hidden;
        min-height: 0;
    }

    .sources-panel .panel-header {
        padding: var(--space-3) var(--space-4);
        border-bottom: 1px solid var(--border-color);
    }

    .sources-panel h2 {
        font-size: var(--text-xs);
        font-weight: 600;
        color: var(--text-tertiary);
        text-transform: uppercase;
        letter-spacing: 0.06em;
    }

    /* Source navigation */
    .source-nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: var(--space-2) var(--space-3);
        border-bottom: 1px solid var(--border-color);
        flex-shrink: 0;
    }

    .source-nav-counter {
        font-size: var(--text-xs);
        color: var(--text-tertiary);
        font-weight: 600;
        font-variant-numeric: tabular-nums;
    }

    .source-nav-btns {
        display: flex;
        gap: var(--space-1);
    }

    .btn-nav {
        background: transparent;
        border: 1px solid var(--border-color);
        color: var(--text-secondary);
        width: 28px;
        height: 28px;
        border-radius: var(--radius-sm);
        cursor: pointer;
        font-size: var(--text-sm);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.1s;
    }

    .btn-nav:hover:not(:disabled) {
        background: var(--accent-subtle);
        color: var(--accent-color);
        border-color: var(--accent-color);
    }

    .btn-nav:disabled {
        opacity: 0.25;
        cursor: not-allowed;
    }

    .source-view {
        flex: 1;
        overflow-y: auto;
        padding: var(--space-2);
    }

    .source-card {
        background: var(--bg-app);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-md);
        overflow: hidden;
    }

    .source-card-header {
        display: flex;
        align-items: center;
        padding: var(--space-2) var(--space-3);
        border-bottom: 1px solid var(--border-color);
        gap: var(--space-2);
        cursor: pointer;
        text-decoration: none;
        transition: background 0.1s;
    }

    .source-card-header:hover {
        background: var(--accent-subtle);
    }

    .source-file {
        font-size: var(--text-sm);
        font-weight: 600;
        color: var(--accent-color);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        flex: 1;
    }

    .source-open-icon {
        font-size: var(--text-sm);
        color: var(--text-tertiary);
        flex-shrink: 0;
    }

    .source-meta {
        padding: var(--space-2) var(--space-3);
        font-size: var(--text-xs);
        color: var(--text-tertiary);
        border-bottom: 1px solid var(--border-color);
        font-variant-numeric: tabular-nums;
    }

    .source-content {
        padding: var(--space-3);
        font-size: var(--text-sm);
        line-height: 1.55;
        color: var(--text-secondary);
        font-family: inherit;
        white-space: pre-wrap;
    }

    .theme-toggle {
        position: absolute;
        top: 12px;
        right: 24px;
        z-index: 100;
    }

    /* Scrollbars */
    ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
    }

    ::-webkit-scrollbar-track {
        background: transparent;
    }

    ::-webkit-scrollbar-thumb {
        background: var(--scrollbar-thumb);
        border-radius: var(--radius-full);
    }

    ::-webkit-scrollbar-thumb:hover {
        background: var(--text-tertiary);
    }

    .no-sources {
        text-align: center;
        color: var(--text-tertiary);
        padding: var(--space-7) var(--space-5);
        font-size: var(--text-sm);
    }

    /* ── Performance metrics bar ── */
    .msg-metrics {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-2) var(--space-4);
        padding: var(--space-2) 0 0;
        margin-top: var(--space-2);
        border-top: 1px solid var(--border-color);
        font-size: var(--text-xs);
        color: var(--text-tertiary);
        font-variant-numeric: tabular-nums;
    }

    .msg-metrics span {
        display: inline-flex;
        align-items: center;
        gap: 3px;
    }

    .msg-metrics .metric-label {
        color: var(--text-tertiary);
    }

    .msg-metrics .metric-value {
        color: var(--text-secondary);
        font-weight: 500;
    }

    /* ── Thinking indicator ── */
    .thinking {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        color: var(--text-secondary);
        font-size: var(--text-sm);
    }

    .thinking-dots {
        display: flex;
        gap: 3px;
        align-items: center;
    }

    .thinking-dots span {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: var(--accent-color);
        animation: thinking-pulse 1.4s ease-in-out infinite;
    }

    .thinking-dots span:nth-child(2) {
        animation-delay: 0.2s;
    }

    .thinking-dots span:nth-child(3) {
        animation-delay: 0.4s;
    }

    @keyframes thinking-pulse {

        0%,
        80%,
        100% {
            opacity: 0.2;
            transform: scale(0.8);
        }

        40% {
            opacity: 1;
            transform: scale(1);
        }
    }
</style>
</head>

<body>
    <div class="app">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h1>Vector Chat</h1>
            </div>

            <!-- Collection Switcher -->
            <div class="collection-select">
                <label for="collection-select">Select a knowledge base</label>
                <select id="collection-select">
                    <option value="ypsilon_collection">Ypsilon</option>
                    <option value="newspark_collection">newspark</option>
                    <option value="mlk_collection">MLK</option>
                </select>
            </div>

            <button class="btn-sidebar" id="new-chat-btn">
                <span style="font-size:1.1em; line-height:1;">+</span> New Chat
            </button>
            <button class="sidebar-spacer"
                style="flex:1; background:transparent; border:none; cursor:default;"></button>
            <button class="btn-sidebar" id="theme-toggle">
                Dark Mode
            </button>
        </div>

        <!-- Center: Chat -->
        <div class="chat-panel">
            <div class="messages" id="messages">
                <div class="welcome">Vector Chat</div>
            </div>
            <div class="input-container">
                <div class="input-area">
                    <textarea id="query-input" placeholder="Ask a question…" rows="1"></textarea>
                    <div class="input-footer">
                        <button class="btn-send" id="send-btn">Send</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right: Sources -->
        <div class="sources-panel">
            <div class="panel-header">
                <h2>Sources</h2>
            </div>
            <div class="source-nav" id="source-nav" style="display:none">
                <span class="source-nav-counter" id="source-counter">1 / 1</span>
                <div class="source-nav-btns">
                    <button class="btn-nav" id="prev-source-btn" title="Previous">&#8592;</button>
                    <button class="btn-nav" id="next-source-btn" title="Next">&#8594;</button>
                </div>
            </div>
            <div class="source-view" id="source-view">
                <div class="no-sources">Chunks will appear here</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
    <script>
        marked.setOptions({ breaks: true, gfm: true });

        // Theme Handling
        const themeToggle = document.getElementById('theme-toggle');
        let currentTheme = localStorage.getItem('theme') || 'light';

        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            themeToggle.textContent = theme === 'light' ? '\u263E Dark' : '\u2600 Light';
            localStorage.setItem('theme', theme);
            currentTheme = theme;
        }
        setTheme(currentTheme);
        themeToggle.addEventListener('click', () => setTheme(currentTheme === 'light' ? 'dark' : 'light'));

        let isNewChat = true;
        let isSending = false;
        let allContexts = [];

        const messagesEl = document.getElementById('messages');
        const sourceView = document.getElementById('source-view');
        const inputEl = document.getElementById('query-input');
        const sendBtn = document.getElementById('send-btn');
        const collectionSelect = document.getElementById('collection-select');

        // Source navigation
        const sourceNav = document.getElementById('source-nav');
        const sourceCounter = document.getElementById('source-counter');
        const prevBtn = document.getElementById('prev-source-btn');
        const nextBtn = document.getElementById('next-source-btn');
        let currentSourceIndex = 0;

        function showSource(index) {
            currentSourceIndex = index;
            const ctx = allContexts[index];
            const fileName = ctx.file_path.split('/').pop();
            sourceCounter.textContent = `${index + 1} / ${allContexts.length}`;
            prevBtn.disabled = index === 0;
            nextBtn.disabled = index === allContexts.length - 1;
            sourceView.innerHTML = `
                <div class="source-card">
                    <div class="source-card-header" onclick="openSourceFile('${ctx.file_path}')" title="Open in ${fileName}">
                        <span class="source-file">${esc(fileName)}</span>
                        <span class="source-open-icon">&#8599;</span>
                    </div>
                    <div class="source-meta">Lines ${ctx.start_line}–${ctx.end_line} &nbsp;·&nbsp; ${Math.round(ctx.similarity * 100)}% match</div>
                    <div class="source-content">${esc(ctx.content)}</div>
                </div>
            `;
        }

        function openSourceFile(path) {
            fetch(`/api/open-pdf?path=${encodeURIComponent(path)}`);
        }

        prevBtn.addEventListener('click', () => { if (currentSourceIndex > 0) showSource(currentSourceIndex - 1); });
        nextBtn.addEventListener('click', () => { if (currentSourceIndex < allContexts.length - 1) showSource(currentSourceIndex + 1); });

        // Auto-resize textarea
        inputEl.addEventListener('input', () => {
            inputEl.style.height = 'auto';
            inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
        });

        inputEl.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!isSending) sendMessage(); }
        });

        sendBtn.addEventListener('click', () => { if (!isSending) sendMessage(); });

        function resetSources() {
            sourceView.innerHTML = '<div class="no-sources">Chunks will appear here</div>';
            sourceNav.style.display = 'none';
            allContexts = [];
            currentSourceIndex = 0;
        }

        collectionSelect.addEventListener('change', () => {
            fetch('/api/reset', { method: 'POST' });
            messagesEl.innerHTML = '<div class="welcome">Vector Chat</div>';
            resetSources();
            isNewChat = true;
        });

        document.getElementById('new-chat-btn').addEventListener('click', () => {
            fetch('/api/reset', { method: 'POST' });
            messagesEl.innerHTML = '<div class="welcome">Vector Chat</div>';
            resetSources();
            isNewChat = true;
        });

        // ── Helpers ──────────────────────────────────────────────────────────────

        function esc(text) {
            return String(text)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;')
                .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function addMessage(role, html) {
            const placeholder = messagesEl.querySelector('.welcome');
            if (placeholder) placeholder.remove();
            const el = document.createElement('div');
            el.className = `message ${role}`;
            el.innerHTML = role === 'user' ?
                `<div class="msg-content">${html}</div>` :
                `<div class="msg-label">Assistant</div><div class="msg-content">${html}</div>`;
            messagesEl.appendChild(el);
            messagesEl.scrollTop = messagesEl.scrollHeight;
            return el;
        }

        function parseSSE(buffer) {
            const events = [];
            const parts = buffer.split('\n\n');
            const remainder = parts.pop() ?? '';
            for (const part of parts) {
                if (!part.trim()) continue;
                const ev = { type: 'message', data: '' };
                for (const line of part.split('\n')) {
                    if (line.startsWith('event: ')) ev.type = line.slice(7).trim();
                    else if (line.startsWith('data: ')) ev.data = line.slice(6);
                }
                events.push(ev);
            }
            return { events, remainder };
        }

        function renderSources(contexts) {
            allContexts = contexts || [];
            if (!allContexts.length) {
                sourceView.innerHTML = '<div class="no-sources">No relevant sources found.</div>';
                sourceNav.style.display = 'none';
                return;
            }
            sourceNav.style.display = 'flex';
            showSource(0);
        }

        async function sendMessage() {
            const query = inputEl.value.trim();
            if (!query || isSending) return;

            isSending = true;
            sendBtn.disabled = true;
            inputEl.value = '';
            inputEl.style.height = 'auto';

            addMessage('user', esc(query));
            const assistantEl = addMessage('assistant', '<div class="thinking"><div class="thinking-dots"><span></span><span></span><span></span></div></div>');
            const contentEl = assistantEl.querySelector('.msg-content');
            let rawText = '';

            try {
                const resp = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        query,
                        reset: isNewChat,
                        collection: collectionSelect.value
                    }),
                });

                isNewChat = false;

                const reader = resp.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const { events, remainder } = parseSSE(buffer);
                    buffer = remainder;
                    for (const ev of events) {
                        if (ev.type === 'contexts') {
                            try { renderSources(JSON.parse(ev.data)); } catch (_) { }
                        } else if (ev.type === 'token') {
                            try {
                                rawText += JSON.parse(ev.data);
                                contentEl.innerHTML = marked.parse(rawText);
                                messagesEl.scrollTop = messagesEl.scrollHeight;
                            } catch (_) { }
                        } else if (ev.type === 'metrics') {
                            try {
                                const m = JSON.parse(ev.data);
                                const bar = document.createElement('div');
                                bar.className = 'msg-metrics';
                                bar.innerHTML = [
                                    `<span><span class="metric-label">Time</span> <span class="metric-value">${m.wall_time_s}s</span></span>`,
                                    `<span><span class="metric-label">Prompt</span> <span class="metric-value">${m.prompt_tokens} tok</span></span>`,
                                    `<span><span class="metric-label">Output</span> <span class="metric-value">${m.completion_tokens} tok</span></span>`,
                                    `<span><span class="metric-label">Speed</span> <span class="metric-value">${m.tokens_per_sec} tok/s</span></span>`,
                                    `<span><span class="metric-label">Model</span> <span class="metric-value">${esc(m.model)}</span></span>`,
                                ].join('');
                                assistantEl.appendChild(bar);
                                messagesEl.scrollTop = messagesEl.scrollHeight;
                            } catch (_) { }
                        }
                    }
                }
            } catch (err) {
                contentEl.textContent = 'Error: ' + err.message;
            } finally {
                isSending = false;
                sendBtn.disabled = false;
                inputEl.focus();
            }
        }
    </script>
</body>
