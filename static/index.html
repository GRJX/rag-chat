<title>Vector Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
    :root {
        /* Light Mode (Notion-like) */
        --bg-app: #ffffff;
        --bg-sidebar: #f7f6f3;
        --bg-message-user: #f1f1ef;
        --bg-message-assistant: transparent;
        --border-color: rgba(55, 53, 47, 0.09);
        --text-main: #37352f;
        --text-secondary: rgba(55, 53, 47, 0.65);
        --accent-color: #2383e2;
        --accent-hover: #0070df;
        --code-bg: #f7f6f3;
        --scrollbar-thumb: #d3d1cb;
        --selection-bg: rgba(35, 131, 226, 0.2);
    }

    [data-theme="dark"] {
        /* Dark Mode (Notion-like) */
        --bg-app: #191919;
        --bg-sidebar: #202020;
        --bg-message-user: #2c2c2c;
        --bg-message-assistant: transparent;
        --border-color: rgba(255, 255, 255, 0.09);
        --text-main: rgba(255, 255, 255, 0.81);
        --text-secondary: rgba(255, 255, 255, 0.44);
        --accent-color: #2383e2;
        --accent-hover: #0070df;
        --code-bg: #262626;
        --scrollbar-thumb: #3f3f3f;
    }

    *,
    *::before,
    *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 13px;
        background: var(--bg-app);
        color: var(--text-main);
        height: 100vh;
        overflow: hidden;
        transition: background 0.2s, color 0.2s;
    }

    .app {
        display: grid;
        grid-template-columns: 240px 1fr 350px;
        height: 100vh;
    }

    /* ── Sidebar (Left) ── */
    .sidebar {
        background: var(--bg-sidebar);
        border-right: 1px solid var(--border-color);
        display: flex;
        flex-direction: column;
        padding: 12px;
        gap: 8px;
    }

    .sidebar-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 4px 8px;
        margin-bottom: 0.9em;
    }

    .sidebar-header h1 {
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--text-main);
    }

    /* ── Collection Selection ── */
    .collection-select {
        margin: 0.6em 0;
        display: flex;
        flex-direction: column;
        gap: 6px;
    }

    .collection-select label {
        font-size: 0.68rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--text-secondary);
        font-weight: 700;
        padding-left: 8px;
    }

    .collection-select select {
        background: rgba(55, 53, 47, 0.05);
        border: 1px solid var(--border-color);
        color: var(--text-main);
        padding: 6px 12px;
        border-radius: 4px;
        font-size: 0.82rem;
        outline: none;
        cursor: pointer;
        width: 100%;
        transition: border-color 0.1s;
    }

    .collection-select select:hover {
        border-color: var(--text-secondary);
    }

    .collection-select select:focus {
        border-color: var(--accent-color);
    }

    [data-theme="dark"] .collection-select select {
        background: rgba(255, 255, 255, 0.05);
    }

    .btn-sidebar {
        background: transparent;
        border: none;
        color: var(--text-secondary);
        padding: 6px 10px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 0.85rem;
        text-align: left;
        display: flex;
        align-items: center;
        gap: 8px;
        width: 100%;
        transition: background 0.1s;
    }

    .btn-sidebar:hover {
        background: rgba(55, 53, 47, 0.08);
        color: var(--text-main);
    }

    [data-theme="dark"] .btn-sidebar:hover {
        background: rgba(255, 255, 255, 0.05);
    }

    /* ── Center: Chat ── */
    .chat-panel {
        display: flex;
        flex-direction: column;
        overflow: hidden;
        min-height: 0;
        background: var(--bg-app);
    }

    .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 24px;
        flex-shrink: 0;
        height: 45px;
    }

    .messages {
        flex: 1;
        overflow-y: auto;
        padding: 40px 15% 100px 15%;
        display: flex;
        flex-direction: column;
        gap: 32px;
        scroll-behavior: smooth;
    }

    .welcome {
        align-self: center;
        margin-top: 4em;
        text-align: center;
        color: var(--text-secondary);
        font-size: 1.5rem;
        font-weight: 700;
    }

    .message {
        max-width: 100%;
        display: flex;
        flex-direction: column;
        gap: 4px;
    }

    .message.user {
        align-self: flex-end;
        background: var(--bg-message-user);
        border-radius: 12px;
        padding: 8px 16px;
        max-width: 85%;
    }

    .message.assistant {
        align-self: flex-start;
        background: var(--bg-message-assistant);
        border-radius: 0;
        padding: 0;
        width: 100%;
    }

    .msg-label {
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--text-secondary);
        margin-bottom: 0.15em;
    }

    .msg-content {
        font-size: 0.85rem;
        line-height: 1.65;
        word-break: break-word;
    }

    /* markdown styles */
    .msg-content p {
        margin-bottom: 1em;
    }

    .msg-content p:last-child {
        margin-bottom: 0;
    }

    .msg-content h1,
    .msg-content h2,
    .msg-content h3 {
        margin: 1.5em 0 0.5em;
        font-weight: 600;
        line-height: 1.3;
    }

    .msg-content h1 {
        font-size: 1.1em;
    }

    .msg-content h2 {
        font-size: 1.0em;
    }

    .msg-content h3 {
        font-size: 0.95em;
    }

    .msg-content code {
        background: var(--code-bg);
        padding: 0.2em 0.4em;
        border-radius: 3px;
        font-family: SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-size: 0.9em;
    }

    .msg-content pre {
        background: var(--code-bg);
        padding: 16px;
        border-radius: 6px;
        overflow-x: auto;
        margin: 1em 0;
    }

    .msg-content pre code {
        background: none;
        padding: 0;
        font-size: 0.9em;
        color: inherit;
    }

    .msg-content ul,
    .msg-content ol {
        padding-left: 1.5em;
        margin: 1em 0;
    }

    .input-container {
        padding: 0 24px 24px 24px;
        background: var(--bg-app);
    }

    .input-area {
        display: flex;
        flex-direction: column;
        background: var(--bg-app);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 8px 12px;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.05);
        max-width: 800px;
        margin: 0 auto;
    }

    textarea#query-input {
        width: 100%;
        background: transparent;
        border: none;
        color: var(--text-main);
        font-size: 0.85rem;
        font-family: inherit;
        resize: none;
        outline: none;
        min-height: 24px;
        padding: 4px 0;
    }

    .input-footer {
        display: flex;
        justify-content: flex-end;
        padding-top: 4px;
    }

    .btn-send {
        background: var(--accent-color);
        border: none;
        color: #fff;
        padding: 4px 12px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 0.85rem;
        font-weight: 600;
        transition: background 0.1s;
    }

    .btn-send:hover {
        background: var(--accent-hover);
    }

    .btn-send:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }

    /* ── Right: Sources ── */
    .sources-panel {
        display: flex;
        flex-direction: column;
        background: var(--bg-sidebar);
        border-left: 1px solid var(--border-color);
        overflow: hidden;
        min-height: 0;
    }

    .sources-panel .panel-header {
        padding: 12px 16px;
        border-bottom: 1px solid var(--border-color);
    }

    .sources-panel h2 {
        font-size: 0.7rem;
        font-weight: 600;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    /* Source navigation */
    .source-nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 6px 12px;
        border-bottom: 1px solid var(--border-color);
        background: rgba(55, 53, 47, 0.03);
        flex-shrink: 0;
    }

    [data-theme="dark"] .source-nav {
        background: rgba(255, 255, 255, 0.03);
    }

    .source-nav-counter {
        font-size: 0.65rem;
        color: var(--text-secondary);
        font-weight: 600;
    }

    .source-nav-btns {
        display: flex;
        gap: 4px;
    }

    .btn-nav {
        background: transparent;
        border: 1px solid var(--border-color);
        color: var(--text-secondary);
        width: 26px;
        height: 26px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 0.85rem;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.1s;
    }

    .btn-nav:hover:not(:disabled) {
        background: rgba(55, 53, 47, 0.08);
        color: var(--text-main);
        border-color: var(--text-secondary);
    }

    .btn-nav:disabled {
        opacity: 0.3;
        cursor: not-allowed;
    }

    [data-theme="dark"] .btn-nav:hover:not(:disabled) {
        background: rgba(255, 255, 255, 0.06);
    }

    .source-view {
        flex: 1;
        overflow-y: auto;
        padding: 4px;
    }

    .source-card {
        background: var(--bg-app);
        border: 1px solid var(--border-color);
        border-radius: 6px;
        overflow: hidden;
    }

    .source-card-header {
        display: flex;
        align-items: center;
        padding: 8px 12px;
        background: rgba(55, 53, 47, 0.03);
        border-bottom: 1px solid var(--border-color);
        gap: 8px;
        cursor: pointer;
        text-decoration: none;
    }

    .source-card-header:hover {
        background: rgba(55, 53, 47, 0.07);
    }

    [data-theme="dark"] .source-card-header {
        background: rgba(255, 255, 255, 0.03);
    }

    [data-theme="dark"] .source-card-header:hover {
        background: rgba(255, 255, 255, 0.07);
    }

    .source-file {
        font-size: 0.7rem;
        font-weight: 600;
        color: var(--accent-color);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        flex: 1;
    }

    .source-open-icon {
        font-size: 0.75rem;
        color: var(--text-secondary);
        flex-shrink: 0;
    }

    .source-meta {
        padding: 6px 12px;
        font-size: 0.65rem;
        color: var(--text-secondary);
        border-bottom: 1px solid var(--border-color);
        background: rgba(55, 53, 47, 0.02);
    }

    .source-content {
        padding: 12px;
        font-size: 0.7rem;
        line-height: 1.5;
        color: var(--text-main);
        font-family: inherit;
        white-space: pre-wrap;
    }

    .theme-toggle {
        position: absolute;
        top: 12px;
        right: 24px;
        z-index: 100;
    }

    /* Scrollbars */
    ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
    }

    ::-webkit-scrollbar-track {
        background: transparent;
    }

    ::-webkit-scrollbar-thumb {
        background: var(--scrollbar-thumb);
        border-radius: 10px;
    }

    .no-sources {
        text-align: center;
        color: var(--text-secondary);
        padding: 40px 20px;
        font-size: 0.85rem;
    }
</style>
</head>

<body>
    <div class="app">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h1>Vector Chat</h1>
            </div>

            <!-- Collection Switcher -->
            <div class="collection-select">
                <label for="collection-select">Database Collection</label>
                <select id="collection-select">
                    <option value="ypsilon_collection">Ypsilon</option>
                    <option value="newspark_collection">newspark</option>
                    <option value="mlk_collection">MLK</option>
                </select>
            </div>

            <button class="btn-sidebar" id="new-chat-btn">
                New Chat
            </button>
            <button class="sidebar-spacer"
                style="flex:1; background:transparent; border:none; cursor:default;"></button>
            <button class="btn-sidebar" id="theme-toggle">
                Dark Mode
            </button>
        </div>

        <!-- Center: Chat -->
        <div class="chat-panel">
            <div class="messages" id="messages">
                <div class="welcome">Vector Chat</div>
            </div>
            <div class="input-container">
                <div class="input-area">
                    <textarea id="query-input" placeholder="Ask a question…" rows="1"></textarea>
                    <div class="input-footer">
                        <button class="btn-send" id="send-btn">Send</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right: Sources -->
        <div class="sources-panel">
            <div class="panel-header">
                <h2>Sources</h2>
            </div>
            <div class="source-nav" id="source-nav" style="display:none">
                <span class="source-nav-counter" id="source-counter">1 / 1</span>
                <div class="source-nav-btns">
                    <button class="btn-nav" id="prev-source-btn" title="Previous">&#8592;</button>
                    <button class="btn-nav" id="next-source-btn" title="Next">&#8594;</button>
                </div>
            </div>
            <div class="source-view" id="source-view">
                <div class="no-sources">Chunks will appear here</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
    <script>
        marked.setOptions({ breaks: true, gfm: true });

        // Theme Handling
        const themeToggle = document.getElementById('theme-toggle');
        let currentTheme = localStorage.getItem('theme') || 'light';

        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            themeToggle.textContent = theme === 'light' ? 'Dark Mode' : 'Light Mode';
            localStorage.setItem('theme', theme);
            currentTheme = theme;
        }
        setTheme(currentTheme);
        themeToggle.addEventListener('click', () => setTheme(currentTheme === 'light' ? 'dark' : 'light'));

        let isNewChat = true;
        let isSending = false;
        let allContexts = [];

        const messagesEl = document.getElementById('messages');
        const sourceView = document.getElementById('source-view');
        const inputEl = document.getElementById('query-input');
        const sendBtn = document.getElementById('send-btn');
        const collectionSelect = document.getElementById('collection-select');

        // Source navigation
        const sourceNav = document.getElementById('source-nav');
        const sourceCounter = document.getElementById('source-counter');
        const prevBtn = document.getElementById('prev-source-btn');
        const nextBtn = document.getElementById('next-source-btn');
        let currentSourceIndex = 0;

        function showSource(index) {
            currentSourceIndex = index;
            const ctx = allContexts[index];
            const fileName = ctx.file_path.split('/').pop();
            sourceCounter.textContent = `${index + 1} / ${allContexts.length}`;
            prevBtn.disabled = index === 0;
            nextBtn.disabled = index === allContexts.length - 1;
            sourceView.innerHTML = `
                <div class="source-card">
                    <div class="source-card-header" onclick="openSourceFile('${ctx.file_path}')" title="Open in ${fileName}">
                        <span class="source-file">${esc(fileName)}</span>
                        <span class="source-open-icon">&#8599;</span>
                    </div>
                    <div class="source-meta">Lines ${ctx.start_line}–${ctx.end_line} &nbsp;·&nbsp; ${Math.round(ctx.similarity * 100)}% match</div>
                    <div class="source-content">${esc(ctx.content)}</div>
                </div>
            `;
        }

        function openSourceFile(path) {
            fetch(`/api/open-pdf?path=${encodeURIComponent(path)}`);
        }

        prevBtn.addEventListener('click', () => { if (currentSourceIndex > 0) showSource(currentSourceIndex - 1); });
        nextBtn.addEventListener('click', () => { if (currentSourceIndex < allContexts.length - 1) showSource(currentSourceIndex + 1); });

        // Auto-resize textarea
        inputEl.addEventListener('input', () => {
            inputEl.style.height = 'auto';
            inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
        });

        inputEl.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!isSending) sendMessage(); }
        });

        sendBtn.addEventListener('click', () => { if (!isSending) sendMessage(); });

        function resetSources() {
            sourceView.innerHTML = '<div class="no-sources">Chunks will appear here</div>';
            sourceNav.style.display = 'none';
            allContexts = [];
            currentSourceIndex = 0;
        }

        collectionSelect.addEventListener('change', () => {
            fetch('/api/reset', { method: 'POST' });
            messagesEl.innerHTML = '<div class="welcome">Vector Chat</div>';
            resetSources();
            isNewChat = true;
        });

        document.getElementById('new-chat-btn').addEventListener('click', () => {
            fetch('/api/reset', { method: 'POST' });
            messagesEl.innerHTML = '<div class="welcome">Vector Chat</div>';
            resetSources();
            isNewChat = true;
        });

        // ── Helpers ──────────────────────────────────────────────────────────────

        function esc(text) {
            return String(text)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;')
                .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function addMessage(role, html) {
            const placeholder = messagesEl.querySelector('.welcome');
            if (placeholder) placeholder.remove();
            const el = document.createElement('div');
            el.className = `message ${role}`;
            el.innerHTML = role === 'user' ?
                `<div class="msg-content">${html}</div>` :
                `<div class="msg-label">Assistant</div><div class="msg-content">${html}</div>`;
            messagesEl.appendChild(el);
            messagesEl.scrollTop = messagesEl.scrollHeight;
            return el;
        }

        function parseSSE(buffer) {
            const events = [];
            const parts = buffer.split('\n\n');
            const remainder = parts.pop() ?? '';
            for (const part of parts) {
                if (!part.trim()) continue;
                const ev = { type: 'message', data: '' };
                for (const line of part.split('\n')) {
                    if (line.startsWith('event: ')) ev.type = line.slice(7).trim();
                    else if (line.startsWith('data: ')) ev.data = line.slice(6);
                }
                events.push(ev);
            }
            return { events, remainder };
        }

        function renderSources(contexts) {
            allContexts = contexts || [];
            if (!allContexts.length) {
                sourceView.innerHTML = '<div class="no-sources">No relevant sources found.</div>';
                sourceNav.style.display = 'none';
                return;
            }
            sourceNav.style.display = 'flex';
            showSource(0);
        }

        async function sendMessage() {
            const query = inputEl.value.trim();
            if (!query || isSending) return;

            isSending = true;
            sendBtn.disabled = true;
            inputEl.value = '';
            inputEl.style.height = 'auto';

            addMessage('user', esc(query));
            const assistantEl = addMessage('assistant', '<span style="color: var(--text-secondary); font-style: italic;">Thinking…</span>');
            const contentEl = assistantEl.querySelector('.msg-content');
            let rawText = '';

            try {
                const resp = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        query,
                        reset: isNewChat,
                        collection: collectionSelect.value
                    }),
                });

                isNewChat = false;

                const reader = resp.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const { events, remainder } = parseSSE(buffer);
                    buffer = remainder;
                    for (const ev of events) {
                        if (ev.type === 'contexts') {
                            try { renderSources(JSON.parse(ev.data)); } catch (_) { }
                        } else if (ev.type === 'token') {
                            try {
                                rawText += JSON.parse(ev.data);
                                contentEl.innerHTML = marked.parse(rawText);
                                messagesEl.scrollTop = messagesEl.scrollHeight;
                            } catch (_) { }
                        }
                    }
                }
            } catch (err) {
                contentEl.textContent = 'Error: ' + err.message;
            } finally {
                isSending = false;
                sendBtn.disabled = false;
                inputEl.focus();
            }
        }
    </script>
</body>

</html>
